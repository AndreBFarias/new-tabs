name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Valida manifest Firefox v2
        run: node tests/validate-manifest.js firefox

      - name: Valida manifest Firefox v3
        run: node tests/validate-manifest.js firefox-v3

      - name: Valida manifest Chrome
        run: node tests/validate-manifest.js chrome

      - name: Valida todas as variantes
        run: node --test tests/manifest-all.test.js
